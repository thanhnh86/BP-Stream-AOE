services:
  srs:
    image: ossrs/srs:latest
    container_name: srs-server
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
      - srs_data:/usr/local/srs/objs/nginx/html/dvr
    command: [ "./objs/srs", "-c", "conf/srs.conf" ]
    restart: always
    networks:
      - srs-network

  db:
    image: mariadb:latest
    container_name: srs-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: aoe_scoreboard
      MARIADB_USER: aoe_user
      MARIADB_PASSWORD: aoe_password
    volumes:
      - ./mysql_data:/var/lib/mysql
    networks:
      - srs-network

  worker:
    build: ./worker
    container_name: srs-worker
    restart: always
    volumes:
      - srs_data:/data
    environment:
      - DATA_DIR=${DATA_DIR:-/data}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_NAME=${DB_NAME:-aoe_scoreboard}
      - ENV=${ENV:-local}
      - WORKER_PORT=${WORKER_PORT:-5001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WORKER_PORT:-5001}:${WORKER_PORT:-5001}"
    networks:
      - srs-network
    depends_on:
      - db

  dashboard:
    build: ./web
    container_name: srs-dashboard
    ports:
      - "83:80"
    volumes:
      - srs_data:/data
    environment:
      - DATA_DIR=${DATA_DIR:-/data}
      - ENV=${ENV:-local}
    depends_on:
      - srs
      - worker
    restart: always
    networks:
      - srs-network

networks:
  srs-network:
    driver: bridge

volumes:
  srs_data:
    driver: local
    # For PRODUCTION, uncomment driver_opts below and set to actual path
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/stream/data'
