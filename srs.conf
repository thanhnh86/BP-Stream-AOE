listen              1935;
max_connections     1000;
daemon              off;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    hls {
        enabled         on;
        hls_path        /usr/local/srs/objs/nginx/html/record/live;
        hls_m3u8_file   [app]/[stream]/[2006]-[01]-[02]/index.m3u8;
        hls_ts_file     [app]/[stream]/[2006]-[01]-[02]/[timestamp].ts;
        hls_fragment    10;
        hls_window      86400;
        hls_cleanup     off;
        hls_dispose     0;
    }

    dvr {
        enabled         on;
        dvr_path        /usr/local/srs/objs/nginx/html/record/live/[app]/[stream]/[2006]-[01]-[02]/[timestamp].mp4;
        dvr_plan        session;
    }
}
