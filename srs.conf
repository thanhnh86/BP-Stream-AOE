listen              1935;
max_connections     1000;
daemon              off;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        /usr/local/srs/objs/nginx/html/record/live_hls;
        hls_fragment    10;
        hls_window      0;
        hls_m3u8_file   [app]/[stream]/[2006]-[01]-[02].m3u8;
        hls_ts_file     [app]/[stream]/[2006]-[01]-[02]/[15]-[04]-[05].ts;
        hls_cleanup     off; # Keep all TS files
    }
    
    # Keep MP4 DVR for local file management too
    dvr {
        enabled         on;
        dvr_apply       all;
        dvr_path        /usr/local/srs/objs/nginx/html/record/live/[app]/[stream]/[2006]-[01]-[02]/[15]-[04]-[05].mp4;
        dvr_plan        session;
        dvr_wait_keyframe on;
        time_jitter     full;
    }
}
