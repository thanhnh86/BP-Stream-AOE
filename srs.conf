listen              1935;
max_connections     1000;
daemon              off;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        /usr/local/srs/objs/nginx/html;
        hls_fragment    5;
        hls_window      30;
    }
    
    dvr {
        enabled         on;
        dvr_apply       all;
        dvr_path        /usr/local/srs/objs/nginx/html/record/live/[app]/[stream]/[2006]-[01]-[02]/[timestamp].mp4;
        dvr_plan        session;
        dvr_wait_keyframe on;
        time_jitter     full;
    }
}
