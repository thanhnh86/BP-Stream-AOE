# SRS configuration for AOE BestPrice
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    # HLS configurations
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    1;      # Low latency
        hls_window      20;     # Short window
        hls_dispose     120;
    }

    # HTTP-FLV remux
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # DVR for replay
    dvr {
        enabled         on;
        dvr_path        /usr/local/srs/objs/nginx/html/dvr/[app]/[stream]/[2006]-[01]-[02]-[15]-[04]-[05].flv;
        dvr_plan        segment;
        dvr_duration    60;
        dvr_wait_keyframe on;
    }

    http_hooks {
        enabled         on;
        on_publish      http://worker:5000/api/v1/debug;
        on_unpublish    http://worker:5000/api/v1/debug;
        on_dvr          http://worker:5000/api/v1/dvr;
    }
}
