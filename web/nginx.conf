server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Fix for refreshing the live page (exact matches win over /live/ prefix)
    location = /live {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /live/ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Proxy HLS streams from SRS (Both live and default app)
    location /live/ {
        proxy_pass http://srs:8080;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    location /__defaultApp__/ {
        proxy_pass http://srs:8080;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy SRS API
    location /srs/ {
        proxy_pass http://srs:1985/;
        proxy_redirect / /srs/;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy API and replays from Worker
    location /api/v1/ {
        proxy_pass http://worker:5000/api/v1/;
    }

    location /replays/ {
        alias /data/;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }
}
